import logging

logger = logging.getLogger(__name__)

class LLMClient:
    @retry(
        stop=stop_after_attempt(3),
        wait=wait_exponential(multiplier=1, min=2, max=10),
        retry=retry_if_exception_type((TimeoutError, ConnectionError)),
        before_sleep=before_sleep_log(logger, logging.WARNING),
        reraise=True
    )
    async def complete(self, prompt: str, **kwargs) -> str:
        """LLM call with automatic retry on transient errors."""
        try:
            response = await self._provider.generate(prompt, **kwargs)
            return response.text
        except Exception as e:
            logger.error(f"LLM call failed: {e}")

from fastapi import Request

logger = structlog.get_logger()

async def logging_middleware(request: Request, call_next):
    start = time.perf_counter()
    response = await call_next(request)
    duration_ms = round((time.perf_counter() - start) * 1000, 2)
    logger.info(

        method=request.method,
        path=request.url.path,
        status_code=response.status_code,
        duration_ms=duration_ms,

    )
    return response`

const TOTAL = STEPS.length;
let doneSet = new Set();

async function loadProgress() {
  try {
    const result = await window.storage.get("documind_progress");
    if (result && result.value) {
      const saved = JSON.parse(result.value);
      doneSet = new Set(saved);
    }
  } catch(e) { doneSet = new Set(); }
  render();
}

async function saveProgress() {
  try {
    await window.storage.set("documind_progress", JSON.stringify([...doneSet]));
  } catch(e) {}
}

function updateProgress() {
  const count = doneSet.size;
  const pct = Math.round((count / TOTAL) * 100);
  document.getElementById("prog-count").textContent = `${count} / ${TOTAL} steps`;
  document.getElementById("prog-bar").style.width = pct + "%";
}

function toggleDone(id) {
  if (doneSet.has(id)) doneSet.delete(id);
  else doneSet.add(id);
  saveProgress();
  const card = document.getElementById("card-" + id);
  const cb = document.getElementById("cb-" + id);
  const btn = document.getElementById("btn-" + id);
  if (doneSet.has(id)) {
    card.classList.add("done");
    cb.classList.add("checked");
    cb.innerHTML = '<i class="ti ti-check" style="font-size:11px;color:#fff"></i>';
    if (btn) { btn.classList.add("done-btn"); btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Done'; }
  } else {
    card.classList.remove("done");
    cb.classList.remove("checked");
    cb.innerHTML = "";
    if (btn) { btn.classList.remove("done-btn"); btn.innerHTML = "Mark as done"; }
  }
  updateProgress();
}

function toggleBody(id) {
  const body = document.getElementById("body-" + id);
  const chev = document.getElementById("chev-" + id);
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  chev.classList.toggle("open", !isOpen);
}

function render() {
  const container = document.getElementById("steps-container");
  let html = "";
  let lastPhase = null;

  STEPS.forEach(step => {
    if (step.phase && step.phase !== lastPhase) {
      lastPhase = step.phase;
      html += `<div class="phase-label">${step.phase}</div>`;
    }

    const isDone = doneSet.has(step.id);
    const badgeClass = step.priority === "critical" ? "badge-red" : step.priority === "high" ? "badge-amber" : "badge-gray";
    const badgeText = step.priority === "critical" ? "Critical" : step.priority === "high" ? "High priority" : "Production";
    const cbInner = isDone ? '<i class="ti ti-check" style="font-size:11px;color:#fff"></i>' : "";

    let codesHtml = "";
    step.codes.forEach(c => {
      codesHtml += `<div class="code-label">${c.label}</div>
      <div class="code-block"><pre>${c.code.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre></div>`;
    });

    html += `
    <div class="step-card ${isDone ? "done" : ""}" id="card-${step.id}">
      <div class="step-header" onclick="toggleBody('${step.id}')">
        <div class="checkbox ${isDone ? "checked" : ""}" id="cb-${step.id}" onclick="event.stopPropagation(); toggleDone('${step.id}')">${cbInner}</div>
        <div class="step-meta">
          <div class="step-title">${step.title}</div>
          <div class="step-badges">
            <span class="badge ${badgeClass}">${badgeText}</span>
            <span class="badge badge-gray"><i class="ti ti-clock" aria-hidden="true" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>${step.effort}</span>
          </div>
        </div>
        <i class="ti ti-chevron-down chevron" id="chev-${step.id}" aria-hidden="true"></i>
      </div>
      <div class="step-body" id="body-${step.id}">
        <div class="step-why">${step.why}</div>
        <div class="divider"></div>
        ${codesHtml}
        <button class="mark-btn ${isDone ? "done-btn" : ""}" id="btn-${step.id}" onclick="toggleDone('${step.id}')">
          ${isDone ? '<i class="ti ti-check" aria-hidden="true"></i> Done' : 'Mark as done'}
        </button>
      </div>
    </div>`;
  });

  container.innerHTML = html;
  updateProgress();
}

loadProgress();
</script>
